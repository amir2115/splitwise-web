server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /sw.js {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* ^/(workbox-|sw-cache-reset).*\.js$ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location ~* ^/(manifest|site)\.webmanifest$ {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location = /index.html {
        try_files $uri =404;
        expires off;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, must-revalidate" always;
    }

    location ~* \.(?:css|js|mjs|png|jpg|jpeg|gif|webp|svg|ico|ttf|woff|woff2|webmanifest)$ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}
