name: Test and deploy PWA

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pwa-deploy
  cancel-in-progress: false

jobs:
  test:
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4

      - name: Build web image
        run: |
          set -euo pipefail

          cd "$GITHUB_WORKSPACE"

          docker build \
            -t splitwise/web:local \
            ./web

      - name: Import image into k3s
        run: |
          set -euo pipefail

          docker save splitwise/web:local | k3s ctr images import -

      - name: Apply Kubernetes manifests
        env:
          DEPLOY_ROOT: ${{ vars.DEPLOY_ROOT || '/opt/offline-splitwise/backend' }}
        run: |
          set -euo pipefail

          cd "$DEPLOY_ROOT"

          kubectl apply -f deploy/k8s/frontends.yaml

      - name: Restart web deployment
        run: |
          set -euo pipefail

          kubectl rollout restart deployment/web -n splitwise

      - name: Wait for rollout
        run: |
          set -euo pipefail

          kubectl rollout status deployment/web -n splitwise --timeout=180s
